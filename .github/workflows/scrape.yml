name: Sync Google Calendar

on:
  schedule:
    # 営業時間（8:00-21:00 JST）15分ごと
    - cron: '*/15 23 * * *'      # 08:00-09:00 JST
    - cron: '*/15 0-11 * * *'    # 09:00-21:00 JST
  workflow_dispatch:  # 手動実行ボタン

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  GOOGLE_ICAL_URL: ${{ secrets.GOOGLE_ICAL_URL }}

jobs:
  sync-google:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --workspace=apps/scraper
      - run: npx tsx apps/scraper/src/scrapers/google-calendar.ts
